# Her PR ve main/master/develop push'ta calisir.
# Build, test ve migration kontrolu yapar.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    name: Build, Test and Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticketgate_test
          POSTGRES_USER: ticketgate
          POSTGRES_PASSWORD: ticketgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__Identity: >-
        Host=localhost;Port=5432;Database=ticketgate_test;Username=ticketgate;Password=ticketgate;Search Path=identity
      ConnectionStrings__Event: >-
        Host=localhost;Port=5432;Database=ticketgate_test;Username=ticketgate;Password=ticketgate;Search Path=events
      ConnectionStrings__Booking: >-
        Host=localhost;Port=5432;Database=ticketgate_test;Username=ticketgate;Password=ticketgate;Search Path=booking
      ConnectionStrings__Payment: >-
        Host=localhost;Port=5432;Database=ticketgate_test;Username=ticketgate;Password=ticketgate;Search Path=payment
      ConnectionStrings__Redis: localhost:6379
      Kafka__BootstrapServers: localhost:9092
      Elasticsearch__Uri: http://localhost:9200
      Jwt__Issuer: ticketgate-ci
      Jwt__Audience: TicketGate.CI
      Jwt__SecretKey: ticketgate-ci-secret-key-minimum-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore TicketGate.sln

      - name: Build
        run: >-
          dotnet build TicketGate.sln
          --no-restore
          --configuration Release
          -v minimal

      - name: Test
        run: >-
          dotnet test TicketGate.sln
          --no-build
          --configuration Release
          -v minimal
          -m:1

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.*

      - name: Migration Check
        run: |
          dotnet ef migrations list \
            --project src/Modules/TicketGate.Identity \
            --startup-project src/TicketGate.API \
            --context IdentityDbContext \
            --no-build
          dotnet ef migrations list \
            --project src/Modules/TicketGate.Event \
            --startup-project src/TicketGate.API \
            --context EventDbContext \
            --no-build
          dotnet ef migrations list \
            --project src/Modules/TicketGate.Booking \
            --startup-project src/TicketGate.API \
            --context BookingDbContext \
            --no-build
          dotnet ef migrations list \
            --project src/Modules/TicketGate.Payment \
            --startup-project src/TicketGate.API \
            --context PaymentDbContext \
            --no-build
