# CI main branch'te basariyla tamamlandiginda calisir.
# Docker image build/push, migration apply, deploy ve smoke test adimlarini yurutur.
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/ticketgate-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/TicketGate.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/ticketgate

            export TICKETGATE_API_IMAGE="${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}"

            docker compose \
              -f infrastructure/docker/docker-compose.yml \
              -f infrastructure/docker/docker-compose.prod.yml \
              pull ticketgate-api

            docker compose \
              -f infrastructure/docker/docker-compose.yml \
              -f infrastructure/docker/docker-compose.prod.yml \
              run --rm ticketgate-api \
              bash infrastructure/scripts/migrate.sh

            docker compose \
              -f infrastructure/docker/docker-compose.yml \
              -f infrastructure/docker/docker-compose.prod.yml \
              up -d --no-deps ticketgate-api

      - name: Smoke Test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sleep 10
            curl -f http://localhost:5001/health/live
            curl -f http://localhost:5001/health/ready
            echo "Smoke test passed!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deploy failed. Check GitHub Actions logs."
