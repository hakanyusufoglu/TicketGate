groups:
  - name: ticketgate
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_requests_received_total{code=~"5.."}[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Yuksek hata orani"

      - alert: OutboxDeadLetter
        expr: ticketgate_outbox_dead_letters_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Outbox dead letter tespit edildi"

      - alert: HighWaitingRoomDepth
        expr: ticketgate_waiting_room_depth > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Waiting room derinligi yuksek"

      - alert: SlowOutboxProcessing
        expr: histogram_quantile(0.99, sum by (le) (rate(ticketgate_outbox_processing_duration_seconds_bucket[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox isleme suresi yuksek"
