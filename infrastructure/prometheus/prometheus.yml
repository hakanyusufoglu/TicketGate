global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ticketgate-api
    static_configs:
      - targets:
          - ticketgate-api:5001
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: kafka
    static_configs:
      - targets:
          - kafka:9092

  - job_name: postgres
    static_configs:
      - targets:
          - postgres:5432
